<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Minta Maaf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-container {
            width: 100%;
            max-width: 400px;
            background: #0d1418;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .header {
            background: #1f2c34;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .header-info {
            flex: 1;
        }

        .contact-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .online-status {
            color: #8696a0;
            font-size: 13px;
            margin-top: 2px;
        }

        .chat-bg {
            background: #0b141a;
            min-height: 500px;
            padding: 20px;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.02) 10px, rgba(255,255,255,.02) 20px);
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.4s forwards;
            justify-content: flex-end;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            position: relative;
            word-wrap: break-word;
            background: #005c4b;
            color: white;
            border-radius: 8px 8px 0 8px;
        }

        .time {
            font-size: 11px;
            color: #8696a0;
            margin-top: 4px;
            text-align: right;
        }

        .read-status {
            font-size: 11px;
            color: #53bdeb;
            margin-top: 4px;
            text-align: right;
        }

        .sticker {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="header">
            <div class="profile-pic">LS</div>
            <div class="header-info">
                <div class="contact-name">My Last Queen</div>
                <div class="online-status">terakhir dilihat hari ini pukul 20:55</div>
            </div>
        </div>

        <div class="chat-bg" id="chatContainer">
        </div>
    </div>

    <script>
        const messages = [
            {
                text: 'Hai kamu, gimana kabarmu? Baik? Lebih baik mungkin?',
                time: '20:45',
                delay: 1000
            },
            {
                text: 'Baguslah kalau gitu. Banyak sih pertanyaan yang ingin kutanyakan tapi dipersingkat saja, kenapa sih kamu pergi?',
                time: '20:45',
                delay: 1500
            },
            {
                text: 'Yaa aku tau itu kesalahanku, Kamu meluk masalahmu sendiri aku juga meluk masalahku sendiri, kamu lampiasin masalahmu dengan caramu yang nggk kusukai aku juga lampiasin masalahku dengan caraku yang nggk kamu sukai',
                time: '20:46',
                delay: 2000
            },
            {
                text: 'Disaat itu mentalku drop dan saat itu juga kamu lagi gabisa diganggu karena persiapan ujian, kuhargai itu nggk kugangu kamu, terus kemana lagi aku nyari ketenangan?',
                time: '20:46',
                delay: 2500
            },
            {
                text: 'Malu rasanya jika jadi seorang anak kecil manja yang selalu haus perhatian sama kamu yang selalu mendam semuanya sendiri',
                time: '20:47',
                delay: 2000
            },
            {
                text: 'Maaf tapi masalaluku nggk seindah mantanmu, disaat orang lain menganggap hal itu berisik, mengganggu, penuh dusta, didalam pikiranku itu ketenangan batin',
                time: '20:47',
                delay: 2200
            },
            {
                text: 'Aku cuma mau ketenangan tanpa ganggu siapapun, aku gabisa ngerokok, aku gabisa mabuk, aku gabisa berantem, aku gabisa keren, aku ga peduli itu semua aku cuma mau duduk sambil nenangin pikiran',
                time: '20:48',
                delay: 2500
            },
            {
                text: 'Hubungan kita dulu toxic aku tau itu, hubungan kita dulu nggk seasik seperti temen²mu, kita jarang ketemu, bicara juga lewat chat wa, kadang juga vc tiap malam',
                time: '20:48',
                delay: 2000
            },
            {
                text: 'sejak saat itu aku juga nggk mikirin mau balik ke masalalu yang kelam kek gitu soalnya sama kamu aku juga udah tenang, tapi aku lupa kalau kamu juga punya masalah sendiri yang bahkan ada yang nggk kamu ceritain',
                time: '20:49',
                delay: 2000
            },
            {
               text: 'Maaf yaa kalo gabisa sempurna, maaf yaa kalo jarang komunikasi, maaf yaa kurang ngusahain sesuatu, maaf yaa nggk sekeren dan segood looking mantanmu, maaf yaa aku nggk peka, maaf yaa ngebosenin, maaf yaa udah jahat banget, maaf yaa udah ingkar janji, maaf yaa udah sia-siain waktu 1 tahunmu kemarin karna nggk sesuai sama ekspektasimu, maaf yaa udah ngelibatin kamu buat nyelesaiin masalah yang terlalu banyak ini, maaf yaa udah terlalu nyaman sampai nggk ngeliat betapa nggk pantesnya diriku',
               time: '20:50',
               delay: 2300
            },
            {
               text: 'hhhh gada yang menarik setelah ini selain kamu soalnya udah ku all in semuanya ke kamu, kayaknya kamu bakal jadi satu satunya yang bisa nyakitin perasaanku nanti, gapapa aku nggk nyesel udah all in semuanya di kamu',
               time: '20:51',
               delay: 2200
            },
            {
               text: 'Kayaknya nanti aku bakal pergi dari sini buat ngejar sesuatu sesuai katamu kalo takdir pasti ketemu lagi tapi gaperlu lah aku malah berharap mending kamu sama mantanmu aja lebih cocok sama kriteriamu',
               time: '20:51',
               delay: 2000
            },
            {
               text: 'sekarang juga kayaknya udah muncul rasa nyaman lagi nggk kayak awal pertama kali kamu ceritain dia ke aku',
               time: '20:52',
               delay: 1900
            },
            {
               text: 'Sampai jumpa yaa apa lebih tepatnya selamat tinggal?',
               time: '20:52',
               delay: 1800
            },
            {
               text: 'melupakanmu tuh karma buatku atas segala hal yang telah kulakuin, ntah udah berapa kali aku nangis, ntah berapa kali aku sakit hanya karna mikirin kamu',
               time: '20:53',
               delay: 2000
            },
            {
                special: 'sticker',
                delay: 1800
            },
            {
                text: 'Yaa kamu berhasil kamu menang tertawalah bahagialah My Last Queen',
                time: '20:53',
                delay: 2100,
                read: true
            }
        ];

        const chatContainer = document.getElementById('chatContainer');
        let currentIndex = 0;

        function addMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            if (message.special === 'sticker') {
                messageDiv.innerHTML = `
                    <div class="bubble">
                        <div class="sticker">😁</div>
                    </div>
                `;
            } else {
                const statusHTML = message.read 
                    ? '<div class="read-status">✓✓ Dibaca</div>' 
                    : '<div class="time">' + message.time + '</div>';
                
                messageDiv.innerHTML = `
                    <div class="bubble">
                        ${message.text}
                        ${statusHTML}
                    </div>
                `;
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function displayNextMessage() {
            if (currentIndex >= messages.length) return;

            const message = messages[currentIndex];

            setTimeout(() => {
                addMessage(message);
                currentIndex++;
                
                if (currentIndex < messages.length) {
                    displayNextMessage();
                }
            }, message.delay);
        }

        displayNextMessage();
    </script>
</body>
</html>
